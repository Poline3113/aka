name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check forth_acc/

      - name: Type-check (mypy)
        run: mypy forth_acc/

      - name: Tests
        run: pytest tests/ -v
